services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: arxiv-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms4g -Xmx4g}
      - cluster.routing.allocation.disk.threshold_enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    networks:
      - arxiv-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8g
    ulimits:
      memlock:
        soft: -1
        hard: -1

  redis:
    image: redis:7-alpine
    container_name: arxiv-redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ""
      --rename-command FLUSHALL ""
      --rename-command CONFIG ""
      --rename-command DEBUG ""
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - arxiv-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arxiv-api
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arxiv-net
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    container_name: arxiv-ingestion
    env_file: .env
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - arxiv-net
    volumes:
      - arxiv_data:/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"

  # One-shot seed service: docker-compose run seed
  seed:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    container_name: arxiv-seed
    env_file: .env
    command: ["python", "-m", "src.ingestion.seed", "--max-papers", "2000"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - arxiv-net
    volumes:
      - arxiv_data:/data
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    profiles:
      - seed
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"

  # One-shot enrichment: docker-compose run enrich
  enrich:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    container_name: arxiv-enrich
    env_file: .env
    command: ["python", "-m", "src.ingestion.enrich"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - arxiv-net
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    profiles:
      - enrich
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"

volumes:
  es_data:
    driver: local
  redis_data:
    driver: local
  arxiv_data:
    driver: local

networks:
  arxiv-net:
    driver: bridge
    internal: true
